let sheets = JSON.parse(localStorage.getItem("mundial2026_web_data") || JSON.stringify(originalSheets));
let activeIndex = 0;

function colToNumber(col) {
  col = String(col).trim().toUpperCase();
  let n = 0;
  for (const ch of col) {
    if (ch >= 'A' && ch <= 'Z') n = n * 26 + (ch.charCodeAt(0) - 64);
  }
  return n;
}
function numberToCol(n) {
  let s = "";
  while (n > 0) {
    let r = (n - 1) % 26;
    s = String.fromCharCode(65 + r) + s;
    n = Math.floor((n - 1) / 26);
  }
  return s;
}
function safe(v) {
  return v === null || v === undefined ? "" : String(v);
}
function init() {
  const tabs = document.getElementById("tabs");
  const sel = document.getElementById("sheetSelect");
  tabs.innerHTML = "";
  sel.innerHTML = "";
  sheets.forEach((s, i) => {
    const b = document.createElement("button");
    b.className = "tab" + (i === activeIndex ? " active" : "");
    b.textContent = s.name;
    b.onclick = () => { activeIndex = i; render(); };
    tabs.appendChild(b);
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = s.name;
    sel.appendChild(opt);
  });
  render();
}
function render() {
  document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active", i===activeIndex));
  document.getElementById("sheetSelect").value = activeIndex;
  const wrap = document.getElementById("sheetWrap");
  const sheet = sheets[activeIndex];
  const rows = sheet.values || [];
  let html = "<table><thead><tr><th>#</th>";
  const maxCols = Math.max(1, ...rows.map(r => r.length));
  for (let c=1; c<=maxCols; c++) html += `<th>${numberToCol(c)}</th>`;
  html += "</tr></thead><tbody>";
  for (let r=0; r<rows.length; r++) {
    html += `<tr><td>${r+1}</td>`;
    for (let c=0; c<maxCols; c++) {
      const val = safe((rows[r] || [])[c]);
      html += `<td contenteditable="true" data-r="${r}" data-c="${c}">${escapeHtml(val)}</td>`;
    }
    html += "</tr>";
  }
  html += "</tbody></table>";
  wrap.innerHTML = html;
  wrap.querySelectorAll("td[contenteditable]").forEach(td => {
    td.addEventListener("input", e => {
      const r = Number(td.dataset.r), c = Number(td.dataset.c);
      while (!sheets[activeIndex].values[r]) sheets[activeIndex].values[r] = [];
      sheets[activeIndex].values[r][c] = td.textContent;
      td.classList.add("edited");
      setStatus("Cambio pendiente de guardar");
    });
  });
  filterRows();
}
function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function saveChanges() {
  localStorage.setItem("mundial2026_web_data", JSON.stringify(sheets));
  setStatus("Guardado en este navegador");
}
function resetChanges() {
  if (!confirm("¿Restaurar los datos originales del archivo convertido?")) return;
  localStorage.removeItem("mundial2026_web_data");
  sheets = JSON.parse(JSON.stringify(originalSheets));
  render();
  setStatus("Restaurado");
}
function setStatus(msg) {
  const s = document.getElementById("status");
  s.textContent = msg;
  setTimeout(()=>{ if(s.textContent===msg) s.textContent=""; }, 3500);
}
function filterRows() {
  const q = document.getElementById("searchBox").value.toLowerCase().trim();
  document.querySelectorAll("#sheetWrap tbody tr").forEach(tr => {
    tr.classList.toggle("hidden", q && !tr.textContent.toLowerCase().includes(q));
  });
}
document.getElementById("searchBox").addEventListener("input", filterRows);

function csvEscape(v) {
  v = safe(v);
  if (/[",\n;]/.test(v)) return '"' + v.replace(/"/g, '""') + '"';
  return v;
}
function downloadCSV() {
  const sheet = sheets[activeIndex];
  const maxCols = Math.max(1, ...sheet.values.map(r => r.length));
  const lines = sheet.values.map(row => {
    const arr = [];
    for (let c=0; c<maxCols; c++) arr.push(csvEscape((row||[])[c]));
    return arr.join(",");
  });
  const blob = new Blob(["\ufeff" + lines.join("\n")], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = sheet.name + ".csv";
  a.click();
}
function downloadJSON() {
  const blob = new Blob([JSON.stringify(sheets, null, 2)], {type:"application/json;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "mundial_2026_datos.json";
  a.click();
}
function putDictadoInRow() {
  const idx = Number(document.getElementById("sheetSelect").value);
  activeIndex = idx;
  const row = Math.max(1, parseInt(document.getElementById("targetRow").value || "1", 10)) - 1;
  const col = Math.max(1, colToNumber(document.getElementById("targetCol").value || "B")) - 1;
  const text = document.getElementById("dictado").value.trim();
  if (!text) { setStatus("No hay texto para colocar"); return; }
  let parts = text
    .replace(/\bcontra\b/gi, ",")
    .split(/[\n,;\t]+/)
    .map(x => x.trim())
    .filter(Boolean);
  if (!parts.length) { setStatus("No encontré datos separados"); return; }
  while (sheets[idx].values.length <= row) sheets[idx].values.push([]);
  for (let i=0; i<parts.length; i++) sheets[idx].values[row][col+i] = parts[i];
  render();
  localStorage.setItem("mundial2026_web_data", JSON.stringify(sheets));
  setStatus(`${parts.length} valores colocados desde ${numberToCol(col+1)}${row+1}`);
}
init();
